<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f48fb1">
<title>🐾 こぎままのアプリ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #ede7f6 100%);
  min-height: 100vh;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDGothic', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
h1 {
  font-size: 24px;
  color: #c2185b;
  margin-bottom: 8px;
  text-align: center;
}
p.sub {
  font-size: 13px;
  color: #ad84b5;
  margin-bottom: 40px;
  text-align: center;
}
.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 400px;
}
a.card {
  background: #fff;
  border-radius: 20px;
  padding: 24px 28px;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(206,147,216,.25);
  border: 2px solid rgba(206,147,216,.3);
  display: flex;
  align-items: center;
  gap: 18px;
  transition: transform 0.15s, box-shadow 0.15s;
}
a.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(206,147,216,.4);
}
.icon { font-size: 36px; }
.text h2 { font-size: 17px; color: #5d4037; margin-bottom: 4px; }
.text p  { font-size: 12px; color: #9e9e9e; }
</style>
</head>
<body>
  <h1>🐾 こぎままのアプリ</h1>
  <p class="sub">使いたいアプリを選んでね</p>
  <div class="cards">
    <a class="card" href="食品期限かんり帳.html">
      <div class="icon">🌸</div>
      <div class="text">
        <h2>食品期限かんり帳</h2>
        <p>食品の賞味期限をかんたん管理</p>
      </div>
    </a>
    <a class="card" href="英会話フレーズ帳.html">
      <div class="icon">💬</div>
      <div class="text">
        <h2>英会話フレーズ帳</h2>
        <p>使える英会話フレーズをチェック</p>
      </div>
    </a>
    <a class="card" href="Ryoの音楽リスト.html">
      <div class="icon">🎵</div>
      <div class="text">
        <h2>Ryoの音楽リスト</h2>
        <p>お気に入りの音楽リスト</p>
      </div>
    </a>
  </div>
</body>
</html>
