<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="英会話フレーズ帳">
<meta name="theme-color" content="#f48fb1">
<title>🌸 英会話フレーズ帳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 50%,#ede7f6 100%);min-height:100vh;font-family:'Hiragino Maru Gothic Pro','BIZ UDGothic',sans-serif;padding:12px 12px 60px}
input,select,button,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{display:none}
.wrap{max-width:600px;margin:0 auto}

/* Header */
.header{background:linear-gradient(135deg,#f48fb1,#ce93d8);border-radius:24px;padding:16px 20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(206,147,216,.4);display:flex;align-items:center;justify-content:space-between}
.header-text h1{font-size:19px;font-weight:bold;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.header-text p{margin-top:4px;font-size:14px;color:rgba(255,255,255,.85)}
.header-corgi{text-align:center}
.header-corgi p{font-size:10px;color:rgba(255,255,255,.9);font-weight:bold;margin-top:2px}

/* Streak */
.streak-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.streak-card{background:#fff;border-radius:16px;padding:10px 20px;text-align:center;box-shadow:0 2px 10px rgba(206,147,216,.2);border:1.5px solid rgba(206,147,216,.3);flex:1}
.streak-num{font-size:24px;font-weight:bold;color:#f48fb1}
.streak-label{font-size:11px;color:#9e9e9e;margin-top:2px}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.date-nav button{background:rgba(255,255,255,.8);border:1.5px solid #e1bee7;border-radius:12px;width:36px;height:36px;font-size:18px;cursor:pointer;color:#ce93d8}
.date-label{font-size:13px;color:#9c6fa4;font-weight:bold;text-align:center;min-width:120px}

/* Phrase card */
.phrase-card{background:#fff;border-radius:24px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(206,147,216,.25);border:2px solid rgba(206,147,216,.2);text-align:center;position:relative}
.phrase-num{font-size:11px;color:#ce93d8;font-weight:bold;margin-bottom:10px;letter-spacing:2px}
.phrase-en{font-size:22px;font-weight:bold;color:#5d4037;line-height:1.5;margin-bottom:8px}
.phrase-kana{font-size:12px;color:#b39ddb;margin-bottom:10px;letter-spacing:1px}
.phrase-ja{font-size:15px;color:#9c6fa4;font-weight:bold;margin-bottom:10px}
.phrase-note{font-size:12px;color:#bdbdbd;line-height:1.6;margin-bottom:18px;padding:10px 14px;background:#fdf6ff;border-radius:12px;text-align:left}

/* Play button */
.btn-play{background:linear-gradient(135deg,#f48fb1,#ce93d8);border:none;border-radius:20px;padding:14px 32px;font-size:16px;font-weight:bold;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(206,147,216,.45);display:flex;align-items:center;gap:8px;margin:0 auto 20px;transition:transform .1s}
.btn-play:active{transform:scale(.96)}
.btn-play.playing{background:linear-gradient(135deg,#ce93d8,#9575cd)}

/* Done button */
.btn-done{background:linear-gradient(135deg,#fce4ec,#f3e5f5);border:2px solid #f48fb1;border-radius:16px;padding:12px 24px;font-size:14px;font-weight:bold;color:#f48fb1;cursor:pointer;width:100%;transition:all .2s}
.btn-done.done{background:linear-gradient(135deg,#f48fb1,#ce93d8);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(206,147,216,.4)}

/* Praise */
.praise-area{margin-top:14px;padding:14px 16px;background:linear-gradient(135deg,#fce4ec,#f3e5f5);border-radius:16px;display:none;text-align:center}
.praise-area.show{display:block;animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.praise-text{font-size:15px;font-weight:bold;color:#c2185b;margin-top:6px}

/* Phrase list */
.section-title{font-size:13px;font-weight:bold;color:#9c6fa4;margin-bottom:8px;padding-left:4px}
.phrase-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.phrase-row{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px rgba(206,147,216,.15);border:1.5px solid rgba(206,147,216,.2);display:flex;align-items:center;gap:10px}
.phrase-row-num{font-size:11px;color:#ce93d8;font-weight:bold;min-width:28px}
.phrase-row-text{flex:1;min-width:0}
.phrase-row-en{font-size:14px;font-weight:bold;color:#5d4037}
.phrase-row-ja{font-size:11px;color:#9c6fa4;margin-top:2px}
.phrase-row-play{background:linear-gradient(135deg,#f8bbd0,#e1bee7);border:none;border-radius:8px;padding:6px 10px;font-size:14px;cursor:pointer;flex-shrink:0}
.phrase-row.today{border-color:#f48fb1;background:linear-gradient(135deg,#fff9fb,#fdf6ff)}

/* Add form */
.add-card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 10px rgba(206,147,216,.2);margin-bottom:16px}
.add-card h3{font-size:14px;color:#7b1fa2;font-weight:bold;margin-bottom:12px}
.form-label{font-size:12px;color:#9c6fa4;font-weight:bold;display:block;margin-bottom:3px}
.form-input{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e1bee7;font-size:14px;background:#fdf6ff;outline:none;color:#5d4037;margin-bottom:10px}
textarea.form-input{resize:none;height:60px}
.btn-addphrase{background:linear-gradient(135deg,#f48fb1,#ce93d8);color:#fff;border:none;border-radius:12px;padding:10px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;box-shadow:0 2px 10px rgba(206,147,216,.4)}

/* Footer */
.footer{text-align:center;margin-top:20px;padding:10px;background:rgba(255,255,255,.6);border-radius:14px;font-size:14px;color:#ce93d8}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:8px;border-radius:14px;font-size:12px;font-weight:bold;cursor:pointer;text-align:center;background:#fff;color:#9c6fa4;border:1.5px solid #e1bee7}
.tab.active{background:linear-gradient(135deg,#f48fb1,#ce93d8);color:#fff;border:none;box-shadow:0 2px 8px rgba(206,147,216,.4)}
</style>
</head>

    </div>

    <div class="tab" id="tab3" onclick="switchTab(3)">➕ フレーズ追加</div>

<script>
var STORAGE_KEY='kogimama-english-v1';
var PHRASES_KEY='kogimama-english-phrases-v1';
// NHKラジオ英会話 2026年度 4月テーマ対応フレーズ
// テーマ：初対面・あいさつ・祝福・お悔やみ・会話のきっかけ・話し合い
var DEFAULT_PHRASES=[
  /* ── 初対面・あいさつ ── */
  {en:"Nice to meet you. I've heard so much about you.",kana:"ナイス トゥー ミート ユー。アイブ ハード ソー マッチ アバウト ユー",ja:"はじめまして。お噂はかねがね。",note:"初対面の定番フレーズ。「お噂はかねがね」と加えると会話が自然に広がる。"},
  {en:"Long time no see! How have you been?",kana:"ロング タイム ノー シー！ハウ ハブ ユー ビーン？",ja:"久しぶり！元気でした？",note:"旧友や知人との再会に使う親しみやすい挨拶。日本語の「久しぶり！」にぴったり対応する表現。"},
  {en:"What a small world!",kana:"ワット ア スモール ワールド！",ja:"世界は狭いですね！",note:"思いがけない場所で知人に会ったときの驚きと喜びを表す定番フレーズ。"},
  {en:"Please, call me [your name].",kana:"プリーズ コール ミー [ユア ネーム]",ja:"[名前]と呼んでください。",note:"初対面で名前を伝えるときの自然な表現。ファーストネームで呼んでもらいたいときに使う。"},
  {en:"It's so good to see you again.",kana:"イッツ ソー グッド トゥー シー ユー アゲン",ja:"また会えてうれしいです。",note:"久しぶりに会った相手への温かい挨拶。It's great / wonderful と置き換えても自然。"},
  /* ── 会話のきっかけ ── */
  {en:"What do you do for a living?",kana:"ワット ドゥー ユー ドゥー フォー ア リビング？",ja:"お仕事は何をされていますか？",note:"相手の職業を尋ねる自然な会話の入口。What's your job? よりも丁寧でナチュラルな表現。"},
  {en:"What brings you here today?",kana:"ワット ブリングズ ユー ヒア トゥデイ？",ja:"今日はどのようなご用件で？",note:"来た目的や理由を尋ねる表現。What's the occasion? と同様の意味で使える。"},
  {en:"Have you been here before?",kana:"ハブ ユー ビーン ヒア ビフォー？",ja:"こちらは初めてですか？",note:"場所やイベントへの親しみを確認するフレーズ。会話のきっかけとして使いやすい。"},
  {en:"Mind if I join you?",kana:"マインド イフ アイ ジョイン ユー？",ja:"一緒に座ってもいいですか？",note:"相手のそばに席をとりたいときの丁寧な表現。Do you mind if I...? の短縮形。"},
  {en:"How do you know each other?",kana:"ハウ ドゥー ユー ノー イーチ アザー？",ja:"どういうご関係ですか？",note:"共通の知人との関係を確認するフレーズ。パーティーや集まりの場でよく使われる。"},
  /* ── 祝福 ── */
  {en:"Congratulations! You really deserve it.",kana:"コングラチュレーションズ！ユー リアリー ディザーブ イット",ja:"おめでとう！あなたの実力ですよ。",note:"相手の努力と成果を認める祝福の言葉。You deserve it. を加えると「頑張ったから当然だ」という意味になる。"},
  {en:"I'm so happy for you!",kana:"アイム ソー ハッピー フォー ユー！",ja:"本当によかったですね！",note:"相手の喜びを自分のことのように喜ぶ表現。for you がポイントで「あなたのために嬉しい」というニュアンス。"},
  {en:"That's wonderful news!",kana:"ザッツ ワンダフル ニューズ！",ja:"それは素晴らしいニュースですね！",note:"嬉しい知らせを聞いたときの自然な反応。That's great / fantastic! にも言い換えられる。"},
  {en:"I'm so proud of you!",kana:"アイム ソー プラウド オブ ユー！",ja:"本当に誇りに思います！",note:"子どもや生徒、親しい友人の成果をたたえる温かい表現。教師・親がよく使う。"},
  {en:"Wishing you all the best!",kana:"ウィッシング ユー オール ザ ベスト！",ja:"すべてうまくいくことを願っています！",note:"新しいスタートや挑戦に臨む相手へのエールの言葉。メッセージカードにもよく使われる表現。"},
  /* ── お悔やみ ── */
  {en:"I'm so sorry for your loss.",kana:"アイム ソー ソーリー フォー ユア ロス",ja:"ご愁傷様です。",note:"身近な人を亡くした相手への定番のお悔やみ表現。英語でのお悔やみの最も基本的なフレーズ。"},
  {en:"Please accept my deepest sympathies.",kana:"プリーズ アクセプト マイ ディーペスト シンパシーズ",ja:"心よりお悔やみ申し上げます。",note:"フォーマルな場面でのお悔やみ表現。My condolences. も同じ意味で使える。"},

var phrases=[], data={};
try{
  var sp=localStorage.getItem(PHRASES_KEY);
  phrases=sp?JSON.parse(sp):DEFAULT_PHRASES.slice();
}catch(e){phrases=DEFAULT_PHRASES.slice();}
try{
  var sd=localStorage.getItem(STORAGE_KEY);
  data=sd?JSON.parse(sd):{streak:0,total:0,lastDate:'',doneDates:[]};
}catch(e){data={streak:0,total:0,lastDate:'',doneDates:[]};}

function savePhrases(){try{localStorage.setItem(PHRASES_KEY,JSON.stringify(phrases));}catch(e){}}
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}

var viewingOffset=0; // 0=today, -1=yesterday, etc.

function getDateStr(offset){
  var d=new Date();
  d.setDate(d.getDate()+(offset||0));
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function getDateLabel(offset){
  var d=new Date();
  d.setDate(d.getDate()+(offset||0));
  var days=['日','月','火','水','木','金','土'];
  return (d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';
}
function getPhraseIndex(offset){
  var d=new Date();
  d.setDate(d.getDate()+(offset||0));
  var base=new Date(2026,3,8);
  var diff=Math.floor((d-base)/86400000);
  var idx=((diff%phrases.length)+phrases.length)%phrases.length;
  return idx;
}

var PRAISES=[
  {emoji:"🐾",text:"すごい！今日もよくできました！"},
  {emoji:"🌸",text:"ネイティブみたいでかっこいい！"},
  {emoji:"✨",text:"毎日続けてえらい！この調子！"},
  {emoji:"🎉",text:"完璧！どんどん上手になってるよ！"},
  {emoji:"💪",text:"やったね！継続は力なり！"},
  {emoji:"🌟",text:"素晴らしい！コーギーも大喜び！"},
  {emoji:"🍀",text:"今日も一歩前進！応援してるよ！"},
  {emoji:"👑",text:"最高！英語マスターへの道まっしぐら！"}
];

function renderToday(){
  var idx=getPhraseIndex(viewingOffset);
  var p=phrases[idx];
  var ds=getDateStr(viewingOffset);
  var isToday=viewingOffset===0;
  var isDone=data.doneDates&&data.doneDates.indexOf(ds)>=0;

  document.getElementById('dateLabel').textContent=getDateLabel(viewingOffset);
  document.getElementById('phraseNum').textContent='フレーズ No.'+(idx+1)+' / '+phrases.length;
  document.getElementById('phraseEn').textContent=p.en;
  document.getElementById('phraseKana').textContent=p.kana||'';
  document.getElementById('phraseJa').textContent=p.ja;
  document.getElementById('phraseNote').textContent=p.note||'';

  var btn=document.getElementById('btnDone');
  var praise=document.getElementById('praiseArea');
  if(isDone){
    btn.textContent='🌸 練習済み！';
    btn.className='btn-done done';
    praise.className='praise-area show';
  } else {
    btn.textContent='✅ 今日の練習完了！';
    btn.className='btn-done';
    praise.className='praise-area';
  }
  if(!isToday){
    btn.style.display='none';
  } else {
    btn.style.display='block';
  }

  document.getElementById('streakNum').textContent=data.streak||0;
  document.getElementById('totalNum').textContent=data.total||0;
}

function changeDay(d){
  viewingOffset+=d;
  if(viewingOffset>0)viewingOffset=0;
  renderToday();
}

/* ── 音声再生: Web Speech API（英語音声を確実に選択） ── */
function pickEnglishVoice(voices){
  // 日本語・中国語・韓国語などの非英語音声を除外した英語音声リスト
  var enVoices=voices.filter(function(v){
    return v.lang.startsWith('en') && !/^(ja|zh|ko|fr|de|es|it|pt|ru|ar)/.test(v.lang);
  });
  // クリアな米国英語女性音声を優先
  return enVoices.find(function(v){return /Samantha/i.test(v.name);})
    || enVoices.find(function(v){return /Karen|Ava|Allison|Victoria|Moira|Tessa/i.test(v.name);})
    || enVoices.find(function(v){return v.lang==='en-US';})
    || enVoices.find(function(v){return v.lang==='en-GB';})
    || enVoices[0]
    || null;
}

function doSpeak(text, onEnd){
  if(!window.speechSynthesis){if(onEnd)onEnd();return;}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';
  u.rate=0.75;
  u.pitch=1.45;
  var voice=pickEnglishVoice(window.speechSynthesis.getVoices());
  if(voice)u.voice=voice;
  // ボタンが永遠に「再生中」にならないよう10秒でタイムアウト
  var timer=setTimeout(function(){window.speechSynthesis.cancel();if(onEnd)onEnd();},10000);
  u.onend=function(){clearTimeout(timer);if(onEnd)onEnd();};
  u.onerror=function(){clearTimeout(timer);if(onEnd)onEnd();};
  window.speechSynthesis.speak(u);
}

function speakText(text, onEnd){
  if(!window.speechSynthesis){if(onEnd)onEnd();return;}
  var voices=window.speechSynthesis.getVoices();
  if(voices&&voices.length>0){
    doSpeak(text,onEnd);
  } else {
    // 音声リストがまだ読み込まれていない場合は読み込み完了を待つ
    var waited=false;
    var fallbackTimer=setTimeout(function(){if(!waited){waited=true;doSpeak(text,onEnd);}},1200);
    window.speechSynthesis.onvoiceschanged=function(){
      if(waited)return;
      waited=true;
      clearTimeout(fallbackTimer);
      window.speechSynthesis.onvoiceschanged=null;
      doSpeak(text,onEnd);
    };
  }
}

function playPhrase(){
  var idx=getPhraseIndex(viewingOffset);
  var p=phrases[idx];
  var btn=document.getElementById('btnPlay');
  btn.textContent='🔊 再生中...';
  btn.className='btn-play playing';
  speakText(p.en,function(){btn.textContent='🔊 ネイティブ発音を聴く';btn.className='btn-play';});
}

function markDone(){
  var ds=getDateStr(0);
  if(!data.doneDates)data.doneDates=[];
  if(data.doneDates.indexOf(ds)>=0)return;
  data.doneDates.push(ds);
  data.total=(data.total||0)+1;

  // streak計算
  var yesterday=getDateStr(-1);
  if(data.lastDate===yesterday||data.lastDate===ds){
    if(data.lastDate!==ds)data.streak=(data.streak||0)+1;
  } else {
    data.streak=1;
  }
  data.lastDate=ds;
  saveData();

  var pr=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  document.getElementById('praiseCorgi').textContent=pr.emoji+' ';
  document.getElementById('praiseText').textContent=pr.text;
  document.getElementById('btnDone').textContent='🌸 練習済み！';
  document.getElementById('btnDone').className='btn-done done';
  document.getElementById('praiseArea').className='praise-area show';
  document.getElementById('streakNum').textContent=data.streak;
  document.getElementById('totalNum').textContent=data.total;
}

function renderList(){
  var todayIdx=getPhraseIndex(0);
  var el=document.getElementById('phraseListEl');
  el.innerHTML=phrases.map(function(p,i){
    var isToday=(i===todayIdx);
    return '<div class="phrase-row'+(isToday?' today':'')+'">'+
      '<div class="phrase-row-num">'+(isToday?'📌':'No.'+(i+1))+'</div>'+
      '<div class="phrase-row-text">'+
        '<div class="phrase-row-en">'+esc(p.en)+'</div>'+
        '<div class="phrase-row-ja">'+esc(p.ja)+'</div>'+
      '</div>'+
      '<button class="phrase-row-play" onclick="playIdx('+i+')">🔊</button>'+
    '</div>';
  }).join('');
}

function playIdx(i){
  speakText(phrases[i].en, null);
}

function addPhrase(){
  var en=document.getElementById('aEn').value.trim();
  var ja=document.getElementById('aJa').value.trim();
  if(!en||!ja)return;
  phrases.push({
    en:en,
    kana:document.getElementById('aKana').value.trim(),
    ja:ja,
    note:document.getElementById('aNote').value.trim()
  });
  savePhrases();
  document.getElementById('aEn').value='';
  document.getElementById('aKana').value='';
  document.getElementById('aJa').value='';
  document.getElementById('aNote').value='';
  alert('追加しました！フレーズ一覧で確認できます🌸');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function switchTab(n){
  document.getElementById('view1').style.display=n===1?'block':'none';
  document.getElementById('view2').style.display=n===2?'block':'none';
  document.getElementById('view3').style.display=n===3?'block':'none';
  document.getElementById('tab1').className='tab'+(n===1?' active':'');
  document.getElementById('tab2').className='tab'+(n===2?' active':'');
  document.getElementById('tab3').className='tab'+(n===3?' active':'');
  if(n===2)renderList();
}

renderToday();
</script>
